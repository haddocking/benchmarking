general:
  # Paths to data
  haddock_dir: _ABSPATH_PWD_/haddock3
  executable: _ABSPATH_PWD_/run-haddock3.sh
  input_list: _ABSPATH_PWD_/prot-prot-bm5/bm5-input.txt
  work_dir: _ABSPATH_PWD_/prot-prot-bm5/HADDOCK3_BM5
  # How many jobs should be executed at a given time
  max_concurrent: 5
  # Receptor / ligands prefixes
  receptor_suffix: _r_u
  ligand_suffix: _l_u

scenarios:
  # -----------------------------------------------
  # 1. HADDOCK 2.4 webserver workflow + params
  - name: HADDOCK24_default
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 200
        concat: 5
        clean: true
        ncores: 2
      modules:
        order: [topoaa, rigidbody, caprieval, seletop, caprieval.1, flexref, caprieval.2, mdref, caprieval.3, clustfcc, seletopclusts, caprieval.4]
        topoaa:
          autohis: true
        rigidbody:
          sampling: 1000
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval:
          reference_fname: _target
        seletop:
          select: 200
        caprieval.1:
          reference_fname: _target
        flexref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.2:
          reference_fname: _target
        mdref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.3:
          reference_fname: _target
        clustfcc:
          threshold: 4
        seletopclusts:
          top_models: 4
        caprieval.4:
          reference_fname: _target

  # HADDOCK 2.4 webserver workflow + params + ambig restrains extracted at 5A
  - name: HADDOCK24_default_5Aambig
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 200
        concat: 5
        clean: true
        ncores: 2
      modules:
        order: [topoaa, rigidbody, caprieval, seletop, caprieval.1, flexref, caprieval.2, mdref, caprieval.3, clustfcc, seletopclusts, caprieval.4]
        topoaa:
          autohis: true
        rigidbody:
          sampling: 1000
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval:
          reference_fname: _target
        seletop:
          select: 200
        caprieval.1:
          reference_fname: _target
        flexref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.2:
          reference_fname: _target
        mdref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.3:
          reference_fname: _target
        clustfcc:
          threshold: 4
        seletopclusts:
          top_models: 4
        caprieval.4:
          reference_fname: _target

  # HADDOCK24-like, ab-initio modeling
  - name: HADDOCK24_ab_initio
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 400
        concat: 5
        clean: true
        ncores: 2
      modules:
        order: [topoaa, rigidbody, caprieval, seletop, caprieval.1, flexref, caprieval.2, mdref, caprieval.3, clustfcc, seletopclusts, caprieval.4]
        topoaa:
          autohis: true
        rigidbody:
          # No AIRs file
          # ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
          # Sampling increased to 10K
          sampling: 10000
          # Generate random AIR
          ranair: true
        caprieval:
          reference_fname: _target
        seletop:
          # Top selection increased to 400
          select: 400
        caprieval.1:
          reference_fname: _target
        flexref:
          # No AIR
          # ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
          # Generate AIRs based on contacts
          contactairs: true
        caprieval.2:
          reference_fname: _target
        mdref:
          # No AIRs file
          # ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
          # Generate AIRs based on contacts
          contactairs: true
        caprieval.3:
          reference_fname: _target
        clustfcc:
          threshold: 4
        seletopclusts:
          top_models: 4
        caprieval.4:
          reference_fname: _target

  # HADDOCK3 parameters at publication time (doi:xxxxx.xxx.xxx)
  - name: HADDOCK3_clustfcc
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 100
        concat: 5
        clean: true
        ncores: 2
      modules:
        order: [topoaa, rigidbody, caprieval, clustfcc, seletopclusts, caprieval.1, flexref, caprieval.2, mdref, caprieval.3, clustfcc.1, seletopclusts.1, caprieval.4]
        topoaa:
          autohis: true
        rigidbody:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval:
          reference_fname: _target
        clustfcc:
          threshold: 4
        seletopclusts:
          top_models: 4
        caprieval.1:
          reference_fname: _target
        flexref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.2:
          reference_fname: _target
        mdref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.3:
          reference_fname: _target
        clustfcc.1:
          threshold: 4
        seletopclusts.1:
          top_models: 4
        caprieval.4:
          reference_fname: _target

  - name: HADDOCK3_rmsdclustering
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 100
        concat: 5
        clean: true
        ncores: 2
      modules:
        order: [topoaa, rigidbody, caprieval, rmsdmatrix, clustrmsd, seletopclusts, caprieval.1, flexref, caprieval.2, mdref, caprieval.3, rmsdmatrix.1, clustrmsd.1, seletopclusts.1, caprieval.4]
        topoaa:
          autohis: true
        rigidbody:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval:
          reference_fname: _target
        rmsdmatrix:
        clustrmsd:
          threshold: 4
        seletopclusts:
          top_models: 4
        caprieval.1:
          reference_fname: _target
        flexref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.2:
          reference_fname: _target
        mdref:
          ambig_fname: _ambig.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5
        caprieval.3:
          reference_fname: _target
        rmsdmatrix.1:
        clustrmsd.1:
          threshold: 4
        seletopclusts.1:
          top_models: 4
        caprieval.4:
