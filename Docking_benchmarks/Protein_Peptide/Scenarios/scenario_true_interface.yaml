general:
  input_list: _ABSPATH_PWD_/protein-peptide-input.txt
  work_dir: _ABSPATH_PWD_/benchmark_output/true_interface

  execution: slurm
  partition: short
  ncores: 40
  max_concurrent: 10

  # peptide ligand is a multi-model file named <id>_l_u.pdb
  # haddock3 detects the MODEL records and treats it as an ensemble itself
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-true_interface
    workflow:
        topoaa:
          autohis: true
          clean: true

        rigidbody:
          tolerance: 5
          sampling: 1000
          ambig_fname: _b_ambig.tbl

        caprieval:
          reference_fname: _target.pdb

        seletop:
          select: 200

        caprieval.1:
          reference_fname: _target.pdb

        flexref:
          tolerance: 5
          ambig_fname: _b_ambig.tbl

        caprieval.2:
          reference_fname: _target.pdb

        emref:
          tolerance: 5
          ambig_fname: _b_ambig.tbl

        caprieval.3:
          reference_fname: _target.pdb

        rmsdmatrix: 

        clustrmsd:
          clust_cutoff: 5

        seletopclusts:
          top_models: 4

        caprieval.4:
          reference_fname: _target.pdb
