general:
  input_list: _ABSPATH_PWD_/protein-peptide-input.txt
  work_dir: _ABSPATH_PWD_/prot-peptide/ab_initio

  execution: slurm
  partition: short
  ncores: 40
  max_concurrent: 10

  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: ab_initio
    workflow:
        topoaa:
          autohis: true

        rigidbody:
          # ab-initio: no ambig restraints, random AIRs instead, larger sampling
          tolerance: 5
          sampling: 10000
          ranair: true

        caprieval:
          reference_fname: _target.pdb

        seletop:
          select: 400

        caprieval.1:
          reference_fname: _target.pdb

        flexref:
          # AIRs derived from contacts on the rigidbody pose
          tolerance: 5
          contactairs: true

        caprieval.2:
          reference_fname: _target.pdb

        emref:
          tolerance: 5
          contactairs: true

        caprieval.3:
          reference_fname: _target.pdb
         
        rmsdmatrix: 

        clustrmsd:
          clust_cutoff: 5

        seletopclusts:
          top_models: 4

        caprieval.4:
          reference_fname: _target.pdb
