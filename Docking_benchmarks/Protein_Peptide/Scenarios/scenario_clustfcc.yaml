general:
  haddock_dir: /trinity/login/skhatri/Benchmarking/benchmarking/haddock3
  executable: /trinity/login/skhatri/Benchmarking/benchmarking/run-haddock3.sh
  input_list: /trinity/login/skhatri/Benchmarking/benchmarking/benchmarking_datasets/protein-peptide/prot-peptide-input.txt
  work_dir: /trinity/login/skhatri/Benchmarking/benchmarking/results/prot-peptide-HADDOCK24_default/haddock3_clustfcc
  execution: slurm
  ncores: 40
  partition: short
  cpus_per_task: 40
  max_concurrent: 7

  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: HADDOCK3_clustfcc
    workflow:
        topoaa:
          autohis: true

        rigidbody:
          tolerance: 5
          ambig_fname: _u_ambig.tbl

        caprieval:
          reference_fname: _target.pdb

        # cluster the rigidbody output before flexref
        clustfcc:
          min_population: 4

        seletopclusts:
          top_models: 4

        caprieval.1:
          reference_fname: _target.pdb

        flexref:
          tolerance: 5
          ambig_fname: _u_ambig.tbl

        caprieval.2:
          reference_fname: _target.pdb

        emref:
          tolerance: 5
          ambig_fname: _u_ambig.tbl

        caprieval.3:
          reference_fname: _target.pdb

        # second clustering pass after refinement
        clustfcc.1:
          min_population: 4

        seletopclusts.1:
          top_models: 4

        caprieval.4:
          reference_fname: _target.pdb
