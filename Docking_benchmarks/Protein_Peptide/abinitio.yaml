general:
  input_list: /home/rodrigo/repos/benchmarking/protein-peptide-input.txt
  work_dir: /home/rodrigo/repos/benchmarking/benchmark_output/ab_initio

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10

  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-ab_initio
    workflow:
        topoaa:

        rigidbody:
          # ab-initio: no ambig restraints, random AIRs instead, larger sampling
          tolerance: 5
          sampling: 10000
          ranair: true

        caprieval.1:
          reference_fname: _target.pdb

        seletop:
          select: 400

        caprieval.2:
          reference_fname: _target.pdb

        flexref:
          # AIRs derived from contacts on the rigidbody pose
          tolerance: 5
          contactairs: true

        caprieval.3:
          reference_fname: _target.pdb

        emref:
          tolerance: 5
          contactairs: true

        caprieval.4:
          reference_fname: _target.pdb
         
        rmsdmatrix: 

        clustrmsd:
          clust_cutoff: 5

        seletopclusts:
          top_models: 10

        caprieval.5:
          reference_fname: _target.pdb
