general:
  input_list: /home/rodrigo/repos/benchmarking/protein-dna-input.txt
  work_dir: /home/rodrigo/repos/benchmarking/benchmark_output/bound-bound

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10

  mol_suffixes:
    - _p1_b
    - _p2_b
    - _p3_b
    - _p4_b
    - _d_b

scenarios:
  - name: run-bound-bound
    workflow:
      topoaa:

      rigidbody:
        tolerance: 5
        sampling: 1000
        ambig_fname: _b_ambig.tbl
        epsilon: 78
        dielec: cdie
        w_desolv: 0

      caprieval.1:
        reference_fname: _target.pdb

      seletop:
        select: 200

      caprieval.2:
        reference_fname: _target.pdb

      flexref:
        tolerance: 5
        ambig_fname: _b_ambig.tbl
        dnarest_on: true
        epsilon: 78
        dielec: cdie
        w_desolv: 0
        tadfactor: 4
        temp_cool3_init: 300

      caprieval.3:
        reference_fname: _target.pdb

      mdref:
        tolerance: 5
        ambig_fname: _b_ambig.tbl
        dnarest_on: true
        w_desolv: 0
        watersteps: 1250

      caprieval.4:
        reference_fname: _target.pdb

      clustfcc:

      seletopclusts:
        top_models: 4

      caprieval.5:
        reference_fname: _target.pdb
