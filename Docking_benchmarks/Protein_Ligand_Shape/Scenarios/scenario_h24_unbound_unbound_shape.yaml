general:
  input_list: _ABSPATH_PWD_/protein-ligand-shape-input.txt
  work_dir: _ABSPATH_PWD_/protein-ligand-shape/h24_unbound_unbound_shape

  execution: slurm
  partition: short
  ncores: 40
  max_concurrent: 10

  mol_suffixes:
    - _r_u_shape
    - _l_u
    - _shape_beads

scenarios:
  - name: run-h24_unbound_unbound_shape
    workflow:
        topoaa:
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          delenph: false
          tolerance: 5

        rigidbody:
          tolerance: 5
          sampling: 1000
          rotate180: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          mol_shape_3: true
          inter_rigid: 0.001
          w_vdw: 0.0
          dielec: cdie
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _unbound_shape.tbl
          unambig_fname: _unbound.tbl

        caprieval:
          reference_fname: _ref_can.pdb

        seletop:
          select: 200

        caprieval.1:
          reference_fname: _ref_can.pdb

        flexref:
          tolerance: 5
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          randremoval: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          nseg3: 0
          mol_shape_3: true
          ambig_fname: _unbound_shape.tbl
          unambig_fname: _unbound.tbl
          dielec: cdie
          epsilon: 10

        caprieval.2:
          reference_fname: _ref_can.pdb

        caprieval.3:
          reference_fname: _ref_can.pdb

        ilrmsdmatrix: {}

        clustrmsd:
          clust_cutoff: 1.5

        seletopclusts:
          top_models: 4

        caprieval.4:
          reference_fname: _ref_can.pdb
