general:
  input_list: _ABSPATH_PWD_/bm5-input.txt
  work_dir: _ABSPATH_PWD_/benchmark_output/HADDOCK24_default_5Aambig

  execution: slurm
  partition: short
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-HADDOCK24_default_5Aambig
    workflow:
        topoaa:
          autohis: true

        rigidbody:
          sampling: 1000
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval:
          reference_fname: _target

        seletop:
          select: 200

        caprieval.1:
          reference_fname: _target

        flexref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval.2:
          reference_fname: _target

        mdref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval.3:
          reference_fname: _target

        clustfcc:
          min_population: 4

        seletopclusts:
          top_models: 4

        caprieval.4:
          reference_fname: _target
