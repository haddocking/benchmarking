general:
  input_list: bm5-input.txt
  work_dir: benchmark_output/HADDOCK24_ab_initio

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-HADDOCK24_ab_initio
    workflow:
        topoaa:

        rigidbody:
          sampling: 1000
          ranair: true
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval.1:
          reference_fname: _target

        seletop:
          select: 400

        caprieval.2:
          reference_fname: _target

        flexref:
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval.3:
          reference_fname: _target

        emref:
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 5

        caprieval.4:
          reference_fname: _target

        clustfcc:
          min_population: 4

        seletopclusts:
          top_models: 10

        caprieval.5:
          reference_fname: _target
