general:
  input_list: _ABSPATH_PWD_/protein-glycan-input.txt
  work_dir: _ABSPATH_PWD_/protein_glycan

  execution: slurm
  partition: short
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_u
    - _l_ensemble

scenarios:
  - name: unbound_ens_vdw_tip-ap_clust
    workflow:
      topoaa:

      rigidbody:
        ambig_fname: _tip-ap.tbl
        w_vdw: 1
        sampling: 4000

      caprieval:
        reference_fname: _analysis
        keep_hetatm: true

      ilrmsdmatrix:

      clustrmsd:
        criterion: maxclust
        n_clusters: 50

      seletopclusts:
        top_clusters: 50
        top_models: 20

      caprieval.1:
        reference_fname: _analysis
        keep_hetatm: true

      flexref:
        ambig_fname: _tip-ap.tbl

      caprieval.2:
        reference_fname: _analysis
        keep_hetatm: true

      ilrmsdmatrix.1:

      clustrmsd.1:
        criterion: distance
        clust_cutoff: 2.5
        linkage: average

      seletopclusts.1:
        top_models: 4

      caprieval.3:
        reference_fname: _analysis
        keep_hetatm: true
