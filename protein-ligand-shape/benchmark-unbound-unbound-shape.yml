general:
  # Paths to data
  haddock_dir: _ABSPATH_PWD_/haddock3
  executable: _ABSPATH_PWD_/run-haddock3.sh
  input_list: _ABSPATH_PWD_/protein-ligand-shape/input_list.txt
  work_dir: _ABSPATH_PWD_/protein-ligand-shape/benchmark_shape
  # How many jobs should be executed at a given time
  max_concurrent: 12   # (12 * 8 = 96)
  # Receptor / ligands suffixes
  receptor_suffix: _r_u_shape
  ligand_suffix: _l_u
  shape_suffix: _shape_beads
# MACHINERY FOR SLURM EXECUTION OF HADDOCK3 JOBS
slurm:
  partition: short # use the short partition
  cpus_per_task: 8 # use 8 cores per task

scenarios:
  # 1 Haddock2.4 Shape docking
  # 1.1 Unbound Unbound shape scenario
  - name: h24_published_unbound_unbound_shape
    parameters:
      general:
        mode: local
        ncores: 8
      modules:
        order: [topoaa, topoaa.mol1, rigidbody, caprieval, seletop, caprieval.1, flexref, caprieval.2, emref, caprieval.3, ilrmsdmatrix, clustrmsd, seletopclusts, caprieval.4]
        topoaa:
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          delenph: false
          autohis: true
        rigidbody:
          tolerance: 5
          sampling: 1000
          rotate180: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          mol_shape_3: true
          inter_rigid: 0.001
          w_vdw: 0.0
          dielec: cdie
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _unbound_shape.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unbound.tbl
        caprieval:
          reference_fname: _ref_can.pdb
        seletop:
          select: 200
        caprieval:
          reference_fname: _ref_can.pdb
        flexref:
          tolerance: 5
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          randremoval: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          nseg3: 0
          mol_shape_3: true
          ambig_fname: _unbound_shape.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unbound.tbl
          dielec: cdie
          epsilon: 10
        caprieval:
          reference_fname: _ref_can.pdb
        emref:
          tolerance: 5
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _unbound_shape.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unbound.tbl
          randremoval: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          nseg3: 0
          mol_shape_3: true
          w_elec: 0.1
          w_air: 0
        caprieval:
          reference_fname: _ref_can.pdb
        ilrmsdmatrix:
        clustrmsd:
          clust_cutoff: 1.5
        seletopclusts:
          top_cluster: 10
          top_models: 4
        caprieval:
          reference_fname: _ref_can.pdb
  # 1.2 Unbound Unbound pharmacophores scenario
  - name: h24_published_unbound_unbound_pharm
    parameters:
      general:
        mode: local
        ncores: 8
      modules:
        order: [topoaa, topoaa.mol1, rigidbody, caprieval, seletop, caprieval.1, flexref, caprieval.2, emref, caprieval.3, ilrmsdmatrix, clustrmsd, seletopclusts, caprieval.4]
        topoaa:
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          delenph: false
          autohis: false
          set_bfactor: false
        topoaa.mol1:
          autohis: true
        rigidbody:
          tolerance: 5
          sampling: 1000
          rotate180: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          mol_shape_3: true
          inter_rigid: 0.001
          w_vdw: 0.0
          dielec: cdie
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _ambig.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unambig.tbl
        caprieval:
          reference_fname: _ref_can.pdb
        seletop:
          select: 200
        caprieval:
          reference_fname: _ref_can.pdb
        flexref:
          tolerance: 5
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _ambig.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unambig.tbl
          randremoval: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          nseg3: 0
          mol_shape_3: true
          dielec: cdie
          epsilon: 10
        caprieval:
          reference_fname: _ref_can.pdb
        emref:
          tolerance: 5
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          ambig_fname: _ambig.tbl  # _unbound_shape-hybrid-shape.tbl
          unambig_fname: _unambig.tbl
          randremoval: false
          mol_fix_origin_1: true
          mol_fix_origin_3: true
          nseg3: 0
          mol_shape_3: true
          w_elec: 0.1
          w_air: 0
        caprieval:
          reference_fname: _ref_can.pdb
        ilrmsdmatrix:
        clustrmsd:
          clust_cutoff: 1.5
        seletopclusts:
          top_cluster: 10
          top_models: 4
        caprieval:
          reference_fname: _ref_can.pdb
