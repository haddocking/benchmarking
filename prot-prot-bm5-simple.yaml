general:
  # Paths to data
  haddock_dir: _ABSPATH_PWD_/haddock3
  executable: _ABSPATH_PWD_/run-haddock3.sh
  input_list: _ABSPATH_PWD_/prot-prot-bm5/bm5-input.txt
  work_dir: _ABSPATH_PWD_/prot-prot-bm5/HADDOCK3_BM5
  max_concurrent: 4
  receptor_suffix: _r_u
  ligand_suffix: _l_u

scenarios:
  - name: center-of-mass
    parameters:
      general:
        mode: batch
        queue: short
        queue_limit: 100
        concat: 5

      modules:
        order: [topoaa, rigidbody]
        topoaa:
          autohis: true
        rigidbody:
          sampling: 2
          cmrest: true
