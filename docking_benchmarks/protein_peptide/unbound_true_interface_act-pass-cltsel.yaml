general:
  input_list: protein-peptide-input.txt
  work_dir: benchmark_output
  execution: slurm
  ncores: 40
  partition: short
  gen_archive: true
  max_concurrent: 10

  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-unbound_true_interface_act-pass-cltsel
    workflow:
        topoaa:

        rigidbody:
          sampling: 3000
          ambig_fname: _u_ambig.tbl

        caprieval.1:
          reference_fname: _target.pdb

        # cluster the rigidbody output before flexref
        clustfcc.1:

        seletopclusts.1:
          top_models: 10

        caprieval.2:
          reference_fname: _target.pdb

        flexref:
          ambig_fname: _u_ambig.tbl

        caprieval.3:
          reference_fname: _target.pdb

        emref:
          ambig_fname: _u_ambig.tbl

        caprieval.4:
          reference_fname: _target.pdb

        # second clustering pass after refinement
        clustfcc.2:

        seletopclusts.2:
          top_models: 10

        caprieval.5:
          reference_fname: _target.pdb
