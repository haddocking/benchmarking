general:
  input_list: protein-peptide-input.txt
  work_dir: benchmark_output

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10

  # peptide ligand is a multi-model file named <id>_l_u.pdb
  # haddock3 detects the MODEL records and treats it as an ensemble itself
  mol_suffixes:
    - _r_b
    - _l_b

scenarios:
  - name: run-bound_true_interface_act-pass
    workflow:
        topoaa:

        rigidbody:
          ambig_fname: _b_ambig.tbl

        caprieval.1:
          reference_fname: _target.pdb

        seletop:

        caprieval.2:
          reference_fname: _target.pdb

        flexref:
          ambig_fname: _b_ambig.tbl

        caprieval.3:
          reference_fname: _target.pdb

        emref:
          ambig_fname: _b_ambig.tbl

        caprieval.4:
          reference_fname: _target.pdb

        clustfcc: 

        seletopclusts:
          top_models: 10

        caprieval.5:
          reference_fname: _target.pdb
