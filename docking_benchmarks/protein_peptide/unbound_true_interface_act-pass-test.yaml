general:
  input_list: protein-peptide-input-test.txt
  work_dir: benchmark_output/unbound_true_interface_act-pass-cltsel

  execution: local
  partition: short
  gen_archive: true
  ncores: 4
  max_concurrent: 1

  # peptide ligand is a multi-model file named <id>_l_u.pdb
  # haddock3 detects the MODEL records and treats it as an ensemble itself
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-unbound-true_interface-test
    workflow:
        topoaa:

        rigidbody:
          sampling: 30
          ambig_fname: _b_ambig.tbl

        caprieval.1:
          reference_fname: _target.pdb

        seletop:
          select: 4

        caprieval.2:
          reference_fname: _target.pdb

        flexref:
          tolerance: 25
          ambig_fname: _b_ambig.tbl

        caprieval.3:
          reference_fname: _target.pdb

        emref:
          ambig_fname: _b_ambig.tbl

        caprieval.4:
          reference_fname: _target.pdb

        clustfcc:

        seletopclusts:

        caprieval.5:
          reference_fname: _target.pdb
