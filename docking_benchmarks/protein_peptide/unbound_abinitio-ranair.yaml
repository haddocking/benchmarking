general:
  input_list: protein-peptide-input.txt
  work_dir: benchmark_output

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10

  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-unbound_ab_initio_ranair
    workflow:
        topoaa:

        rigidbody:
          # ab-initio: no ambig restraints, random AIRs instead, larger sampling
          sampling: 9000
          ranair: true

        caprieval.1:
          reference_fname: _target.pdb

        seletop:
          select: 400

        caprieval.2:
          reference_fname: _target.pdb

        flexref:
          # AIRs derived from contacts on the rigidbody pose
          contactairs: true

        caprieval.3:
          reference_fname: _target.pdb

        emref:
          contactairs: true

        caprieval.4:
          reference_fname: _target.pdb
         
        clustfcc:

        seletopclusts:
          top_models: 10

        caprieval.5:
          reference_fname: _target.pdb
