general:
  input_list: protein-glycan-input.txt
  work_dir: benchmark_output

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_b
    - _l_b

scenarios:
  - name: run-bound_true_interface_act-pass-cltsel
    workflow:
      topoaa:

      rigidbody:
        ambig_fname: _tip-ap.tbl
        w_vdw: 1

      caprieval.1:
        reference_fname: _analysis
        keep_hetatm: true

      ilrmsdmatrix.1:

      clustrmsd.1:
        criterion: maxclust
        n_clusters: 50

      seletopclusts.1:
        top_clusters: 50
        top_models: 20

      caprieval.2:
        reference_fname: _analysis
        keep_hetatm: true

      flexref:
        ambig_fname: _tip-ap.tbl

      caprieval.3:
        reference_fname: _analysis
        keep_hetatm: true

      ilrmsdmatrix.2:

      clustrmsd.2:
        criterion: distance
        clust_cutoff: 2.5
        linkage: average

      seletopclusts.2:
        top_models: 4

      caprieval.4:
        reference_fname: _analysis
        keep_hetatm: true
