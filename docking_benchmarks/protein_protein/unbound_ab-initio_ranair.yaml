general:
  input_list: bm5-input.txt
  work_dir: benchmark_output/unbound_ab-initio_ranair

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
  - name: run-unbound_ab-initio_ranair
    workflow:
        topoaa:

        rigidbody:
          sampling: 10000
          ranair: true
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top

        caprieval.1:
          reference_fname: _target

        seletop:
          select: 400

        caprieval.2:
          reference_fname: _target

        flexref:
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          contactairs: true
          tolerance: 25

        caprieval.3:
          reference_fname: _target

        emref:
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          contactairs: true

        caprieval.4:
          reference_fname: _target

        clustfcc:

        seletopclusts:

        caprieval.5:
          reference_fname: _target
