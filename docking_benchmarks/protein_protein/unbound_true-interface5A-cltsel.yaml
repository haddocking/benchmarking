  work_dir: benchmark_output/unbound_true-interface5A-cltsel

  execution: slurm
  partition: short
  gen_archive: true
  ncores: 40
  max_concurrent: 10
  mol_suffixes:
    - _r_u
    - _l_u

scenarios:
