          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top

        caprieval.1:
          reference_fname: _target

        clustfcc.1:

        seletopclusts.1:

        caprieval.2:
          reference_fname: _target

        flexref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top
          tolerance: 25

        caprieval.3:
          reference_fname: _target

        emref:
          ambig_fname: _ambig5.tbl
          unambig_fname: _restraint-bodies
          hbond_fname: _hbonds
          ligand_param_fname: _ligand.param
          ligand_top_fname: _ligand.top

